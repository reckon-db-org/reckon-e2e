syntax = "proto3";

package reckon.gateway.v1;

option go_package = "github.com/reckon-db-org/reckon-gateway/gen/go/gatewayv1;gatewayv1";

import "reckon_shared.proto";

// CausationService provides causation and correlation tracking.
//
// Track event lineage: which event caused which, and which events
// share the same business correlation.
service CausationService {

  // Get all events caused by a specific event.
  rpc GetEffects(CausationRequest) returns (CausationResponse);

  // Get the event that caused a specific event.
  rpc GetCause(CausationRequest) returns (SingleEventResponse);

  // Get the full causation chain from root to the given event.
  rpc GetCausationChain(CausationRequest) returns (CausationResponse);

  // Get all events sharing the same correlation_id.
  rpc GetCorrelated(CorrelationRequest) returns (CausationResponse);

  // Build a causation graph (tree of cause→effect relationships).
  rpc BuildCausationGraph(CausationRequest) returns (CausationGraphResponse);
}

// ──────────────────────────────────────────────
// Requests
// ──────────────────────────────────────────────

message CausationRequest {
  string store_id = 1;
  string event_id = 2;
}

message CorrelationRequest {
  string store_id = 1;
  string correlation_id = 2;
}

// ──────────────────────────────────────────────
// Responses
// ──────────────────────────────────────────────

message CausationResponse {
  repeated RecordedEvent events = 1;
}

message SingleEventResponse {
  RecordedEvent event = 1;
}

message CausationGraphNode {
  RecordedEvent event = 1;
  repeated CausationGraphNode children = 2;
}

message CausationGraphResponse {
  CausationGraphNode root = 1;
}
